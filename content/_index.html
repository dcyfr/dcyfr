<style>
    @keyframes fadeIn {
        0% {
            opacity: 0;
        }
        100% {
            opacity: 1;
        }
    }
    .fade-in {
        opacity: 1;
        animation: fadeIn 0.65s 1 ease-in;
    }
    #spotify-player {
        position: relative;
        width: 100%;
        height: 82px;
        border-radius: 12px;
        margin: 1rem 0 1.5rem 0;
        padding: 0;
    }
    #splash-page {
        position: absolute;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        background: #00000088 url(/images/site/background.webp) fixed center center;
        background-blend-mode: overlay;
        background-size: cover;
    }
    body {
        background-color: var(--background-color);
    }
    header,
    footer {
        display: none;
    }
    .profile {
        margin: 5rem 0 3rem 0;
    }
    .profile .avatar {
        background-color: var(--font-color);
        padding: 3px;
        border-radius: 50%;
        width: 128px;
        height: 128px;
    }
    .profile .profile-title {
        font-size: 2rem;
        margin: 2rem 0 0.5rem 0;
    }
    .profile .profile-description {
        font-style: italic;
        margin: 0rem auto;
    }
    .page-wrapper {
        margin: 0 auto;
        padding: 1rem;
        min-width: 360px;
        max-width: 414px;
    }
    .social-links {
        margin: 3rem 0 1rem 0;
    }
    .page-footer {
        letter-spacing: 1px;
        font-size: 14px;
        padding: 2rem 0;
    }
    @media (max-width: 360px) {
        .profile .avatar {
            width: 125px;
            height: 125px;
        }
    }
</style>
